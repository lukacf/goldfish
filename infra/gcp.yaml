project: king-dnn-training-dev
region: us-central1

run:
  gpu_preference:
    - h100
    - a100
    - none
  search_timeout_sec: 900
  initial_backoff_sec: 10
  backoff_multiplier: 1.5
  max_attempts: 150
  preemptible_preference: on_demand_first

resources:
  - name: ce_cpu_c4
    machine_type: c4-highcpu-192
    gpu:
      type: none
      accelerator: null
      count: 0
    preemptible_allowed: true
    on_demand_allowed: true
    zones:
      - us-central1-f
      - us-central1-a
    boot_disk:
      type: hyperdisk-balanced
      size_gb: 600
    data_disk:
      type: hyperdisk-balanced
      size_gb: 600
      mode: rw
  - name: ce_h100_spot
    machine_type: a3-highgpu-1g
    gpu:
      type: h100
      accelerator: nvidia-h100-80gb
      count: 1
    preemptible_allowed: true
    on_demand_allowed: false
    zones:
      - us-central1-a
      - us-central1-b
      - us-central1-c
      - us-west4-a
    boot_disk:
      type: hyperdisk-balanced
      size_gb: 600
    data_disk:
      type: hyperdisk-balanced
      size_gb: 600
      mode: rw
  - name: ce_h100_on_demand
    machine_type: a3-highgpu-1g
    gpu:
      type: h100
      accelerator: nvidia-h100-80gb
      count: 1
    preemptible_allowed: false
    on_demand_allowed: true
    zones:
      - us-central1-a
      - us-central1-b
      - us-central1-c
      - us-west4-a
    boot_disk:
      type: hyperdisk-balanced
      size_gb: 600
    data_disk:
      type: hyperdisk-balanced
      size_gb: 600
      mode: rw
  - name: ce_a100_on_demand
    machine_type: a2-highgpu-1g
    gpu:
      type: a100
      accelerator: nvidia-tesla-a100
      count: 1
    preemptible_allowed: true
    on_demand_allowed: true
    zones:
      - us-central1-f
      - us-central1-b
      - us-west4-b
      - europe-west4-a
    boot_disk:
      type: pd-ssd
      size_gb: 600
    data_disk:
      type: pd-ssd
      size_gb: 600
# ce_cpu_n2d and ce_cpu_small removed - launch.py sorts by smallest data_disk which is wrong
# For CPU jobs, we want c4-highcpu-192

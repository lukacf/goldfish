name: CI Tests

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pre-commit

      - name: Run linting and static analysis
        run: |
          pre-commit run ruff --all-files
          pre-commit run ruff-format --all-files
          pre-commit run mypy --all-files

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[test]"

      - name: Run unit tests
        run: make test-unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unit
          name: coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            goldfish-rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('goldfish-rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: goldfish-rust
        run: cargo test

  integration-tests:
    needs: [unit-tests, rust-tests]
    runs-on: ubuntu-latest
    # Run on main, feature branches, or same-repo PRs
    if: >
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/feature/') ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure git for tests
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[test]"

      - name: Run integration tests
        run: make test-integration
        timeout-minutes: 10

  all-tests-passed:
    # Gate job to ensure all tests pass before merge
    needs: [lint, unit-tests, rust-tests, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all tests passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.rust-tests.result }}" != "success" || \
                "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "One or more required tests failed"
            exit 1
          fi
          echo "All required tests passed!"

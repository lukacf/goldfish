name: io-validation-pipeline
description: Test pipeline for validating goldfish.io in GCE containers

stages:
  - name: generate_test_data
    inputs: {}
    outputs:
      test_array:
        type: npy
      test_csv:
        type: csv
      test_directory:
        type: directory

  - name: validate_io
    inputs:
      test_array:
        from_stage: generate_test_data
        type: npy
      test_csv:
        from_stage: generate_test_data
        type: csv
      test_directory:
        from_stage: generate_test_data
        type: directory
    outputs:
      validation_results:
        type: csv
      transformed_array:
        type: npy
